name: Deploy docs to GitHub Pages .io

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permisos ultra-explícitos nativos de GitHub Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
          
      - name: Instalar Constructor MkDocs
        run: pip install mkdocs-material
        
      - name: Compilar HTML Nativo
        run: mkdocs build
        
      - name: Empaquetar Pagina (Nativo)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar Directamente a Nube
        id: deployment
        uses: actions/deploy-pages@v4
