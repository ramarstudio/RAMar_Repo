site_name: RAMar Studio — Documentación
site_description: Documentación oficial del Sistema de Control de Asistencia Biométrico
site_author: RAMar Studio
site_url: https://ramarstudio.github.io/RAMar_Repo/
repo_url: https://github.com/ramarstudio/RAMar_Repo
repo_name: ramarstudio/RAMar_Repo

theme:
  name: material
  language: es
  icon:
    logo: material/shield-check
  favicon: material/shield-check
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro

nav:
  - Inicio: index.md
  - Producto:
      - producto/index.md
      - Beneficios: producto/beneficios.md
      - Como funciona: producto/como-funciona.md
  - Instalacion:
      - instalacion/index.md
      - Requisitos previos: instalacion/requisitos.md
      - Guia paso a paso: instalacion/guia.md
  - Arquitectura:
      - arquitectura/index.md
      - ADR — Por que WPF: arquitectura/adr-wpf.md
      - Motor biometrico: arquitectura/motor-biometrico.md
  - Ingenieria:
      - ingenieria/index.md
      - Metodologia SDLC: ingenieria/metodologia.md
      - Requisitos MoSCoW: ingenieria/requisitos.md
      - Diagramas UML: ingenieria/diagramas.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ramarstudio
