site_name: RAMar Studio
site_description: Sistema de Control de Asistencia con Reconocimiento Facial
site_author: RAMar Studio
site_url: https://ramarstudio.github.io/RAMar_Repo/
repo_url: https://github.com/ramarstudio/RAMar_Repo
repo_name: ramarstudio/RAMar_Repo

theme:
  name: material
  language: es
  font:
    text: Source Sans Pro
    code: Source Code Pro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.path
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo claro
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo oscuro

nav:
  - Inicio: index.md
  - Producto:
      - producto/index.md
      - Beneficios: producto/beneficios.md
      - Cómo funciona: producto/como-funciona.md
  - Instalación:
      - instalacion/index.md
      - Requisitos previos: instalacion/requisitos.md
      - Guía paso a paso: instalacion/guia.md
  - Arquitectura:
      - arquitectura/index.md
      - WPF vs Web: arquitectura/adr-wpf.md
      - Motor biométrico: arquitectura/motor-biometrico.md
  - Ingeniería:
      - ingenieria/index.md
      - SDLC: ingenieria/metodologia.md
      - Requisitos MoSCoW: ingenieria/requisitos.md
      - Diagramas: ingenieria/diagramas.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: es

extra_css:
  - assets/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ramarstudio
  generator: false
